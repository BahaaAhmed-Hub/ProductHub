<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>ProductHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Source+Serif+4:ital,wght@0,500;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Capture an Asana OAuth return (?code&state=asana:...) before the
      // Supabase client loads — its own detectSessionInUrl also scans for a
      // "?code=" param (Google sign-in uses the same redirect-URI shape) and
      // would otherwise race this and strip the query string first. Runs as
      // a plain synchronous script, which always executes before the
      // deferred module script below, so there's no race to lose.
      (function () {
        var params = new URLSearchParams(window.location.search);
        var code = params.get('code');
        var state = params.get('state');
        if (code && state && state.indexOf('asana:') === 0) {
          sessionStorage.setItem('ph.asanaOAuthCode', code);
          sessionStorage.setItem('ph.asanaOAuthState', state);
          var url = new URL(window.location.href);
          url.searchParams.delete('code');
          url.searchParams.delete('state');
          window.history.replaceState({}, '', url.toString());
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

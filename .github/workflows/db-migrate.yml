name: Apply DB migrations

# Applies supabase/migrations/*.sql to the Supabase Postgres database from a
# GitHub runner (which has open internet — unlike the build sandbox). The DB
# connection string is read from the SUPABASE_DB_URL repo secret and never
# printed. Runs on manual dispatch or when a migration file changes.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/db-migrate.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check secret is present
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "::error::SUPABASE_DB_URL secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Ensure psql is available
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          fi
          psql --version

      - name: Apply all migrations in order
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -e
          echo "== 0001_init.sql (schema — tolerant of re-runs) =="
          # 0001 isn't idempotent (create type/table); on a re-run "already exists"
          # is harmless, so don't stop on it.
          psql "$DB_URL" -f supabase/migrations/0001_init.sql || true
          for f in $(ls supabase/migrations/*.sql | sort); do
            case "$f" in *0001_init.sql) continue ;; esac
            echo "== $f =="
            psql "$DB_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Verify
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "profiles (expect 0 after cleanup):"
          psql "$DB_URL" -Atc "select count(*) from profiles;"
          echo "requests (expect 0 after cleanup):"
          psql "$DB_URL" -Atc "select count(*) from requests;"
          echo "orgs (expect 0):"
          psql "$DB_URL" -Atc "select count(*) from orgs;"

# trigger: apply migrations

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; don't cancel an in-progress production deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: npm ci
      - run: npm run build
        env:
          # Supabase anon key is a public client key (RLS-protected) — safe to
          # embed in a static build. Not a secret.
          VITE_SUPABASE_URL: https://cgitrswstyamfoialkbw.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNnaXRyc3dzdHlhbWZvaWFsa2J3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3ODYxNzQsImV4cCI6MjA5OTM2MjE3NH0.E6K-VGQhVrm34fg3vTahQpPtTmUuTcaiYmS-NxJrlHo
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

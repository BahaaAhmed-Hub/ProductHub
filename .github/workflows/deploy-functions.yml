name: Deploy Edge Functions

# Deploys supabase/functions/* to the Supabase project and sets their secrets.
# Runs on a GitHub runner (open internet) using the Supabase CLI.
# Requires repo secrets:
#   SUPABASE_ACCESS_TOKEN  — supabase.com/dashboard/account/tokens
#   ANTHROPIC_API_KEY      — for the ai-summary function
#   (later: SLACK_WEBHOOK_URL, ASANA_CLIENT_ID/SECRET, POSTHOG_* as functions are added)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-functions.yml'

env:
  PROJECT_REF: cgitrswstyamfoialkbw

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check access token
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret not set (supabase.com/dashboard/account/tokens)."
            exit 1
          fi

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            supabase secrets set "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" --project-ref "$PROJECT_REF"
          else
            echo "::warning::ANTHROPIC_API_KEY not set — ai-summary will return a config error until it is."
          fi

      - name: Deploy functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy --project-ref "$PROJECT_REF"

# trigger: deploy functions (secrets now set)
